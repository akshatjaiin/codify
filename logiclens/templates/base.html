<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Codify{% endblock %} — LogicLens</title>
    <meta name="description" content="AI-driven learning diagnostic system for coding proficiency" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-deepest: #06080f;
            --bg-deep: #0a0e1a;
            --bg-base: #0f1423;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.06);
            --bg-sidebar: rgba(10,14,26,0.95);
            --border-subtle: rgba(255,255,255,0.06);
            --border-medium: rgba(255,255,255,0.1);
            --text-primary: #e2e7ef;
            --text-secondary: #8b95a8;
            --text-tertiary: #5a6478;
            --accent-blue: #5b8fd9;
            --accent-purple: #9b7bd4;
            --accent-pink: #c96b9e;
            --accent-green: #3baa8a;
            --accent-amber: #d4a041;
            --accent-red: #d45c5c;
            --gradient-primary: linear-gradient(135deg, #5b8fd9, #9b7bd4);
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.08);
            --glass-shadow: 0 4px 16px rgba(0,0,0,0.2);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --sidebar-width: 260px;
            --sidebar-collapsed: 72px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* === Sidebar === */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        .sidebar.collapsed .brand-text,
        .sidebar.collapsed .nav-item span,
        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .credits-info {
            display: none;
        }

        .sidebar.collapsed .sidebar-brand { justify-content: center; padding: 16px 12px; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 11px; }
        .sidebar.collapsed .credits-card { justify-content: center; padding: 10px; gap: 0; }
        .sidebar.collapsed .credits-icon { width: 32px; height: 32px; font-size: 16px; }

        body.sidebar-collapsed .main-content {
            margin-left: var(--sidebar-collapsed);
        }

        .sidebar-brand {
            padding: 16px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .sidebar-toggle {
            width: 30px;
            height: 30px;
            border: none;
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            transition: all 0.2s;
            margin-left: auto;
        }

        .sidebar-toggle:hover {
            background: rgba(255,255,255,0.12);
            color: var(--text-primary);
        }

        .sidebar.collapsed .sidebar-toggle {
            margin: 0 auto;
        }

        .sidebar-brand .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient-primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .sidebar-brand .brand-text {
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand .brand-name {
            font-size: 17px;
            font-weight: 600;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .sidebar-brand .brand-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
        }

        .sidebar-nav .nav-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-tertiary);
            padding: 12px 12px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(59,130,246,0.12);
            color: var(--accent-blue);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--gradient-primary);
            border-radius: 0 3px 3px 0;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .nav-item.active svg {
            opacity: 1;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .credits-card {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1));
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: var(--radius-md);
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .credits-icon {
            width: 38px;
            height: 38px;
            background: var(--gradient-primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .credits-info {
            display: flex;
            flex-direction: column;
        }

        .credits-label {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .credits-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* === Main Content === */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            padding: 28px 36px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .page-header .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .page-body {
            flex: 1;
            padding: 0 36px 36px;
            min-height: 0;
        }

        /* === Utility Classes === */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255,255,255,0.12);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .stat-card {
            padding: 22px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .stat-card.blue::before { background: var(--accent-blue); }
        .stat-card.purple::before { background: var(--accent-purple); }
        .stat-card.green::before { background: var(--accent-green); }
        .stat-card.amber::before { background: var(--accent-amber); }

        .stat-card .stat-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .stat-card.blue .stat-icon { background: rgba(59,130,246,0.12); }
        .stat-card.purple .stat-icon { background: rgba(139,92,246,0.12); }
        .stat-card.green .stat-icon { background: rgba(16,185,129,0.12); }
        .stat-card.amber .stat-icon { background: rgba(245,158,11,0.12); }

        .stat-card .stat-value {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .stat-card.blue .stat-value { color: var(--accent-blue); }
        .stat-card.purple .stat-value { color: var(--accent-purple); }
        .stat-card.green .stat-value { color: var(--accent-green); }
        .stat-card.amber .stat-value { color: var(--accent-amber); }

        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 2px 8px rgba(91,143,217,0.2);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(91,143,217,0.25);
        }

        .btn-ghost {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }

        .btn-ghost:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border-medium);
        }

        .hidden { display: none !important; }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* === Animations === */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.35s ease forwards;
        }

        .animate-in:nth-child(2) { animation-delay: 0.06s; }
        .animate-in:nth-child(3) { animation-delay: 0.12s; }
        .animate-in:nth-child(4) { animation-delay: 0.18s; }
        .animate-in:nth-child(5) { animation-delay: 0.24s; }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
                width: var(--sidebar-width);
            }
            .main-content {
                margin-left: 0;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">⚡</div>
            <div class="brand-text">
                <div class="brand-name">Codify</div>
                <div class="brand-sub">LogicLens AI</div>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">☰</button>
        </div>

        <div class="sidebar-nav">
            <div class="nav-label">Navigate</div>
            <a href="{% url 'dashboard_page' %}" class="nav-item {% block nav_dashboard %}{% endblock %}" id="nav-dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'editor_page' %}" class="nav-item {% block nav_editor %}{% endblock %}" id="nav-editor">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                <span>Editor</span>
            </a>

            <div class="nav-label">Insights</div>
            <a href="{% url 'progress_page' %}" class="nav-item {% block nav_progress %}{% endblock %}" id="nav-progress">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span>Progress</span>
            </a>
            <a href="{% url 'knowledge_page' %}" class="nav-item {% block nav_knowledge %}{% endblock %}" id="nav-knowledge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span>Knowledge</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="credits-card">
                <div class="credits-icon">💎</div>
                <div class="credits-info">
                    <span class="credits-label">Credits</span>
                    <span class="credits-value" id="sidebarCredits">—</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        {% block content %}{% endblock %}
    </main>

    <script>
        function getCookie(name) {
            const cookieValue = document.cookie
                .split(";")
                .map((c) => c.trim())
                .find((c) => c.startsWith(`${name}=`));
            return cookieValue ? decodeURIComponent(cookieValue.split("=")[1]) : "";
        }

        async function refreshSidebarCredits() {
            try {
                const res = await fetch("{% url 'credits_balance_api' %}");
                const data = await res.json();
                if (data.ok) {
                    document.getElementById('sidebarCredits').textContent = data.credits;
                }
            } catch (e) {
                console.error('credits fetch failed', e);
            }
        }

        refreshSidebarCredits();

        // Sidebar toggle
        const sidebarEl = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        const saved = localStorage.getItem('sidebarCollapsed');
        if (saved === 'true') {
            sidebarEl.classList.add('collapsed');
            document.body.classList.add('sidebar-collapsed');
            toggleBtn.textContent = '☰';
        }
        toggleBtn.addEventListener('click', () => {
            const collapsed = sidebarEl.classList.toggle('collapsed');
            document.body.classList.toggle('sidebar-collapsed', collapsed);
            toggleBtn.textContent = collapsed ? '☰' : '✕';
            localStorage.setItem('sidebarCollapsed', collapsed);
            // Trigger resize for Monaco editor
            window.dispatchEvent(new Event('resize'));
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
